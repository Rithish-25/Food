version: '3.8'

services:
  backend:
    build: ./back
    container_name: food-backend
    ports:
      - "8001:5000"
    env_file:
      - ./back/.env
    environment:
      - PORT=5000
      - NODE_ENV=development

  frontend:
    build: ./front
    container_name: food-frontend
    ports:
      - "8002:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001/api
      - BROWSER=none
    depends_on:
      - backend
