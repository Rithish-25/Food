apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-backend
  template:
    metadata:
      labels:
        app: food-backend
    spec:
      containers:
      - name: food-backend
        image: food-website-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          value: "mongodb+srv://rithish:rithish@cluster0.fmzkavt.mongodb.net/food-ordering?retryWrites=true&w=majority"
        - name: JWT_SECRET
          value: "supersecretkey123"
        - name: NODE_ENV
          value: "development"
---
apiVersion: v1
kind: Service
metadata:
  name: food-backend
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 8001
    targetPort: 5000
  selector:
    app: food-backend
